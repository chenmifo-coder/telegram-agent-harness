name: Deploy to Render

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check . --ignore E501

      - name: Syntax check
        run: |
          python -m py_compile agent_harness.py
          python -m py_compile telegram_bot.py
          echo "✅ 語法檢查通過"

  deploy:
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Render Deploy
        run: |
          curl -s -X POST "${{ https://api.render.com/sync/exs-d8jrdtd8nd3s73a4qjo0?key=_sttFmGzIPM }}" \
            -H "Content-Type: application/json" \
            --fail
          echo "🚀 已觸發 Render 部署"
