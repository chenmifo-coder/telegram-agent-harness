<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>聯絡我們 | FMTX AI 創新科技</title>
  <link rel="stylesheet" href="style.css">
  <link rel='preconnect' href='https://fonts.googleapis.com'>
  <link href='https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap' rel='stylesheet'>
</head>
<body>
<header class="site-header">
  <nav class="navbar">
    <a class="nav-brand" href="index.html">
      <span class="brand-icon">⬡</span>
      <span class="brand-name">FMTX<span class="brand-accent"> AI</span></span>
    </a>
    <ul class="nav-links">
      <li><a href="index.html" class="nav-link">首頁</a></li>
      <li><a href="games.html" class="nav-link">遊戲專區</a></li>
      <li><a href="pricing.html" class="nav-link">定價方案</a></li>
      <li><a href="contact.html" class="nav-link active">聯絡我們</a></li>
    </ul>
    <button class="nav-toggle" aria-label="選單">☰</button>
  </nav>
</header>
<main>
<section class="hero">
  <div class="hero-bg"></div>
  <div class="container">
    <span class="hero-tag">聯絡我們</span>
    <h1 class="hero-title">FMTX AI 創新科技</h1>
    <p class="hero-desc">有任何問題或需求，請填寫下表，我們會盡快回覆。</p>
    <div class="hero-cta">
      <a href="#contact-form" class="btn btn-primary">立即聯絡</a>
    </div>
  </div>
</section>

<section id="contact-form-section" class="container">
  <div class="card">
    <h2 class="section-title" style="text-align:left; margin-bottom:24px;">
      發送訊息
    </h2>
    <form id="contact-form">
      <div class="grid-2">
        <div>
          <label for="name" class="form-label">姓名</label>
          <input type="text" id="name" name="name" required class="form-input">
        </div>
        <div>
          <label for="email" class="form-label">電子郵件</label>
          <input type="email" id="email" name="email" required class="form-input">
        </div>
      </div>
      <div>
        <label for="subject" class="form-label">主題</label>
        <input type="text" id="subject" name="subject" required class="form-input">
      </div>
      <div>
        <label for="message" class="form-label">訊息</label>
        <textarea id="message" name="message" rows="5" required class="form-input"></textarea>
      </div>
      <button type="submit" class="btn btn-primary">送出訊息</button>
    </form>
    <div id="form-response" style="margin-top:16px; color:#00E676; font-weight:600; display:none;"></div>
  </div>
</section>
</main>
<footer class="site-footer">
  <div class="container">
    <div class="footer-brand">
      <span class="brand-icon">⬡</span>
      <span class="brand-name">FMTX<span class="brand-accent"> AI</span></span>
    </div>
    <p class="footer-desc">AI 驅動的下一代雲端解決方案</p>
    <p class="footer-copy">© 2026 FMTX AI 創新科技股份有限公司</p>
  </div>
</footer>
<script src="script.js" defer></script>
</body>
</html>
