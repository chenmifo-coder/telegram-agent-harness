<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>聯絡我們 - 全雲端公司</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <img src="logo.png" alt="公司標誌" class="logo">
    <div class="title">
      <h1>全雲端公司</h1>
      <p>讓您的業務無縫雲端化</p>
    </div>
    <button id="theme-toggle" aria-label="切換深色/淡色主題">🌓</button>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <h2>選單</h2>
      <a href="index.html" class="nav-link">首頁</a>
      <a href="about.html" class="nav-link">關於我們</a>
      <a href="services.html" class="nav-link">服務項目</a>
      <a href="contact.html" class="nav-link active">聯絡我們</a>
    </aside>

    <main class="main-content">
      <section class="hero">
        <div class="hero-content">
          <h2>聯絡我們</h2>
          <p>有任何問題或需求，請填寫下表，我們會盡快回覆。</p>
        </div>
      </section>

      <section>
        <form id="contact-form" class="card">
          <div>
            <label for="name">姓名</label>
            <input type="text" id="name" name="name" required>
          </div>
          <div>
            <label for="email">電子郵件</label>
            <input type="email" id="email" name="email" required>
          </div>
          <div>
            <label for="subject">主題</label>
            <input type="text" id="subject" name="subject" required>
          </div>
          <div>
            <label for="message">訊息</label>
            <textarea id="message" name="message" rows="5" required></textarea>
          </div>
          <button type="submit" class="cta-button">送出</button>
        </form>
        <div id="form-response" style="display:none; margin-top:1rem; color:#10b981; font-weight:600;"></div>
      </section>
    </main>
  </div>

  <footer>
    <p>© 2025 全雲端公司。保留所有權利。</p>
    <button class="contact-btn" id="show-modal">需要協助？點擊此處</button>
  </footer>

  <!-- 模態視窗 (簡單示範) -->
  <div id="help-modal" class="modal">
    <div class="modal-content">
      <span class="close-btn">&times;</span>
      <h3>需要即時協助</h3>
      <p>請透過電話或 Email 聯繫我們的客服團隊。</p>
      <p>電話：+886 2 1234 5678</p>
      <p>Email：support@fullcloud.example.com</p>
    </div>
  </div>

  <script src="script.js" defer></script>
</body>
</html>
