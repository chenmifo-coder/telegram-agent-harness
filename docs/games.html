<!DOCTYPE html>
<html lang='zh-TW'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1.0'>
<title>FMTX AI 創新公司</title>
<link rel='stylesheet' href='style.css'>
</head>
<body>
<header>
<h1>[FMTX AI 創新科技]</h1>
<p>AI 驅動的下一代雲端解決方案</p>
<nav>
<ul>
<li><a href='index.html'>首頁</a></li>
<li><a href='games.html' class='active'>遊戲專區</a></li>
<li><a href='pricing.html'>定價方案</a></li>
<li><a href='contact.html'>聯絡我們</a></li>
</ul>
</nav>
<button id='theme-toggle' class='theme-toggle' aria-label='切換深色/淺色模式'>🌓</button>
</header>

<main class="main-content" style="padding: 2rem;">
<h2>遊戲列表</h2>
<div class="game-list" style="display: flex; flex-wrap: wrap; gap: 2rem; justify-content: center;">
  <a href="snake-game.html" class="game-card" style="text-decoration: none; color: inherit;">
    <div style="background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); width: 260px; padding: 1.5rem; text-align: center; transition: transform 0.2s;">
      <h3 style="margin-top: 0; color: #831843;">貪吃蛇</h3>
      <p style="color: #555; font-size: 0.9rem;">經典街機版貪吃蛇遊戲，使用方向鍵或螢幕觸控控制。</p>
      <div style="margin-top: 1rem; font-size: 0.8rem; color: #888;">點擊開始遊戲</div>
    </div>
  </a>
  <a href="tetris.html" class="game-card" style="text-decoration: none; color: inherit;">
    <div style="background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); width: 260px; padding: 1.5rem; text-align: center; transition: transform 0.2s;">
      <h3 style="margin-top: 0; color: #831843;">俄羅斯方塊</h3>
      <p style="color: #555; font-size: 0.9rem;">經典俄羅斯方塊遊戲，使用方向鍵移動與旋轉方塊，消除行數獲得分數。</p>
      <div style="margin-top: 1rem; font-size: 0.8rem; color: #888;">點擊開始遊戲</div>
    </div>
  </a>
  <!-- 以後可在此加入更多遊戲卡片 -->
</div>
</main>

<footer>
<p> 2026 全雲端公司 | 由 AI Agent 自動維護</p>
<button id='contact-btn' class='contact-btn'>聯絡我們</button>
</footer>
<div id='contact-modal' class='modal'>
<div class='modal-content'>
<span class='close-btn'>&times;</span>
<h2>聯絡我們</h2>
<form id='contact-form'>
<label for='cname'>姓名：</label>
<input type='text' id='cname' name='cname' required><br><br>
<label for='cemail'>Email：</label>
<input type='email' id='cemail' name='cemail' required><br><br>
<label for='cmsg'>訊息：</label>
<textarea id='cmsg' name='cmsg' rows='4' required></textarea><br><br>
<button type='submit'>送出</button>
</form>
<div id='form-response' style='margin-top:1rem; display:none;'></div>
</div>
</div>
<script src='script.js'></script>
</body>
</html>
