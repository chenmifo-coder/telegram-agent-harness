<!DOCTYPE html>
<html lang='zh-TW'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1.0'>
<title>遊戲專區 - FMTX AI 創新公司</title>
<link rel='stylesheet' href='style.css'>
<style>
/* Games page specific enhancements */
:root {
  --game-bg: #f8fafc;
  --game-card-bg: #ffffff;
  --game-primary: #6366f1;
  --game-accent: #10b981;
  --game-shadow: 0 4px 12px rgba(0,0,0,0.08);
  --game-shadow-hover: 0 8px 24px rgba(0,0,0,0.12);
  --game-radius: 12px;
  --game-transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
}
body { background: var(--game-bg); }
.section-title {
  text-align: center;
  margin: 2.5rem 0 1.5rem;
  font-size: 1.8rem;
  color: var(--game-primary);
  position: relative;
}
.section-title::after {
  content: "";
  display: block;
  width: 60px;
  height: 4px;
  background: linear-gradient(90deg, #ec4899, #10b981);
  margin: 0.5rem auto 0;
  border-radius: 2px;
}
.game-list {
  display: flex;
  flex-wrap: wrap;
  gap: 2.5rem;
  justify-content: center;
}
.game-card {
  background: var(--game-card-bg);
  border-radius: var(--game-radius);
  box-shadow: var(--game-shadow);
  width: 280px;
  padding: 1.8rem;
  text-align: center;
  transition: var(--game-transition);
  position: relative;
  overflow: hidden;
  text-decoration: none;
  color: inherit;
}
.game-card:hover {
  transform: translateY(-8px) scale(1.02);
  box-shadow: var(--game-shadow-hover);
}
.game-card::after {
  content: "";
  position: absolute;
  inset: 0;
  background:
    linear-gradient(
      to bottom,
      rgba(0,0,0,0) 0%,
      rgba(0,0,0,0.05) 40%,
      rgba(0,0,0,0.1) 100%
    );
  pointer-events: none;
}
.game-card img {
  max-width: 100%;
  height: auto;
  margin-bottom: 1rem;
}
.game-card h3 {
  margin: 0.5rem 0;
  font-size: 1.25rem;
  color: var(--text-light);
}
.game-card p {
  font-size: 0.9rem;
  color: #64748b;
}
</style>
</head>
<body>
<header>
<img src="logo.png" alt="FMTX Logo" class="logo">
<div class="title">
<h1>FMTX AI 創新公司</h1>
<p>AI 驅動的下一代雲端解決方案</p>
</div>
</header>

<div class="layout">
<aside class="sidebar">
<h2>選單</h2>
<a href='index.html' class='nav-link'>首頁</a>
<a href='games.html' class='nav-link'>遊戲專區</a>
<a href='pricing.html' class='nav-link'>定價方案</a>
<a href='contact.html' class='nav-link'>聯絡我們</a>
<a href='power.html' class='nav-link'>電源工程師知識</a>
</aside>

<main class="main-content>
<!-- 遊戲專區內容 -->
<section>
  <h2 class="section-title">熱門遊戲</h2>
  <div class="game-list">
    <a href="#" class="game-card">
      <img src="https://via.placeholder.com/260x150?text=Game+1" alt="遊戲 1">
      <h3>太空探險</h3>
      <p>探索未知星系，解開宇宙謎題。</p>
    </a>
    <a href="#" class="game-card">
      <img src="https://via.placeholder.com/260x150?text=Game+2" alt="遊戲 2">
      <h3>魔法王國</h3>
      <p>施展咒語，擊敗黑暗勢力。</p>
    </a>
    <a href="#" class="game-card">
      <img src="https://via.placeholder.com/260x150?text=Game+3" alt="遊戲 3">
      <h3>賽車狂飆</p>
      <p>高速競速，挑戰極限。</p>
    </a>
    <!-- 更多遊戲卡片可依需求添加 -->
  </div>
</section>
</main>
</div>

<footer>
<p> 2026 全雲端公司 | 由 AI Agent 自動維護</p>
