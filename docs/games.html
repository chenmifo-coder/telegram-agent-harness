<!DOCTYPE html>
<html lang='zh-TW'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1.0'>
<title>遊戲專區 - FMTX AI 創新公司</title>
<link rel='stylesheet' href='style.css'>
<style>
/* Games page specific enhancements */
:root {
  --game-bg: #f8fafc;
  --game-card-bg: #ffffff;
  --game-primary: #6366f1;
  --game-accent: #10b981;
  --game-shadow: 0 4px 12px rgba(0,0,0,0.08);
  --game-shadow-hover: 0 8px 24px rgba(0,0,0,0.12);
  --game-radius: 12px;
  --game-transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
}
body { background: var(--game-bg); }
.section-title {
  text-align: center;
  margin: 2.5rem 0 1.5rem;
  font-size: 1.8rem;
  color: var(--game-primary);
  position: relative;
}
.section-title::after {
  content: "";
  display: block;
  width: 60px;
  height: 4px;
  background: linear-gradient(90deg, #ec4899, #10b981);
  margin: 0.5rem auto 0;
  border-radius: 2px;
}
.game-list {
  display: flex;
  flex-wrap: wrap;
  gap: 2.5rem;
  justify-content: center;
}
.game-card {
  background: var(--game-card-bg);
  border-radius: var(--game-radius);
  box-shadow: var(--game-shadow);
  width: 280px;
  padding: 1.8rem;
  text-align: center;
  transition: var(--game-transition);
  position: relative;
  overflow: hidden;
  text-decoration: none;
  color: inherit;
}
.game-card:hover {
  transform: translateY(-8px) scale(1.02);
  box-shadow: var(--game-shadow-hover);
}
.game-card::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
  opacity: 0;
  transition: opacity 0.3s;
}
.game-card:hover::after { opacity: 1; }
.game-icon { font-size: 2.5rem; margin-bottom: 1rem; }
.game-title { font-size: 1.25rem; margin: 0.5rem 0; color: var(--game-primary); }
.game-desc { font-size: 0.9rem; color: #555; }
</style>
</head>
<body>
<header>
<div class="title">
<h1>FMTX AI 創新公司</h1>
<p>AI 驅動的下一代雲端解決方案</p>
</div>
<div class="dropdown">
  <button class="dropbtn" aria-label="開啟選單">選單 ▼</button>
  <div class="dropdown-content">
    <a href='index.html'>首頁</a>
    <a href='games.html' class='active'>遊戲專區</a>
    <a href='pricing.html'>定價方案</a>
    <a href='contact.html'>聯絡我們</a>
    <a href='power.html'>電源工程師知識</a>
  </div>
</div>
<button id='theme-toggle' class='theme-toggle' aria-label='切換深色/淺色模式'>🌓</button>
</header>

<main class="main-content">
<section>
<h2 class="section-title">精選遊戲</h2>
<div class="game-list">
<a href="#" class="game-card">
<div class="game-icon">🎮</div>
<h3 class="game-title">益智解謎</h3>
<p class="game-desc">挑戰邏輯與空間思維的經典解謎遊戲。</p>
</a>
<a href="#" class="game-card">
<div class="game-icon">🚀</div>
<h3 class="game-title">太空競速</h3>
<p class="game-desc">高速飛行躲避障礙，考驗反應速度。</p>
</a>
<a href="#" class="game-card">
<div class="game-icon">🧩</div>
<h3 class="game-title">方塊消除</h3>
<p class="game-desc">匹配相同顏色方塊，消除得分。</p>
</a>
<a href="#" class="game-card">
<div class="game-icon">🏎️</div>
<h3 class="game-title">賽車競速</h3>
<p class="game-desc">在各種賽道上爭取第一名。</p>
</a>
</div>
</section>
</main>

<footer>
<p> 2026 全雲端公司 | 由 AI Agent 自動維護</p>
</footer>

<script src='script.js' defer></script>
</body>
</html>
