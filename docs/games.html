<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>遊戲專區 | FMTX AI 創新科技</title>
  <link rel="stylesheet" href="style.css">
  <link rel='preconnect' href='https://fonts.googleapis.com'>
  <link href='https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap' rel='stylesheet'>
  <style>
    /* Extra styles for game */
    #game-card { text-align:center; }
    #gameCanvas {
      background: var(--bg-card);
      border: 1px solid var(--border);
      width: 100%;
      max-width: 800px;
      height: 450px;
      display: block;
      margin: 0 auto;
      cursor: crosshair;
    }
  </style>
</head>
<body>
  <header class="site-header">
    <nav class="navbar">
      <a class="nav-brand" href="index.html">
        <span class="brand-icon">⬡</span>
        <span class="brand-name">FMTX<span class="brand-accent"> AI</span></span>
      </a>
      <ul class="nav-links">
        <li><a href="index.html" class="nav-link">首頁</a></li>
        <li><a href="games.html" class="nav-link active">遊戲專區</a></li>
        <li><a href="pricing.html" class="nav-link">定價方案</a></li>
        <li><a href="contact.html" class="nav-link">聯絡我們</a></li>
      </ul>
      <button class="nav-toggle" aria-label="選單">☰</button>
    </nav>
  </header>
  <main>
    <section>
      <div class="container">
        <h2 class="section-title">遊戲專區</h2>
        <div id="game-card">
          <canvas id="gameCanvas">Your browser does not support the canvas element.</canvas>
        </div>
        <p class="text-secondary text-center" style="margin-top:1.5rem;">使用方向鍵控制角色，享受 AI 驅動的互動體驗。</p>
      </div>
    </section>
  </main>
  <footer class="site-footer">
    <div class="container">
      <div class="footer-brand">
        <span class="brand-icon">⬡</span>
        <span class="brand-name">FMTX<span class="brand-accent"> AI</span></span>
      </div>
      <p class="footer-desc">AI 驅動的下一代雲端解決方案</p>
      <p class="footer-copy">© 2026 FMTX AI 創新科技股份有限公司</p>
    </div>
  </footer>
  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    function resizeCanvas() {
      canvas.width = canvas.clientWidth;
      canvas.height = canvas.clientHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();
    // Simple animated square
    let x = 50, y = 50, dx = 2, dy = 2;
    function draw() {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      ctx.fillStyle = '#6C63FF'; // accent color
      ctx.fillRect(x, y, 50, 50);
      if (x + dx > canvas.width-50 || x + dx < 0) dx = -dx;
      if (y + dy > canvas.height-50 || y + dy < 0) dy = -dy;
      x += dx; y += dy;
      requestAnimationFrame(draw);
    }
    draw();
  </script>
</body>
</html>
