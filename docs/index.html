<script>
// 3D interactive effect: move dashboard based on mouse position
document.addEventListener('DOMContentLoaded', () => {
  const container = document.querySelector('.dashboard-container');
  const scene = document.querySelector('.scene');
  if (!container || !scene) return;

  let rotateX = 0, rotateY = 0;
  const maxRotate = 8; // degrees

  scene.addEventListener('mousemove', e => {
    const rect = scene.getBoundingClientRect();
    const x = e.clientX - rect.left; // x position within the element
    const y = e.clientY - rect.top;  // y position within the element
    const centerX = rect.width / 2;
    const centerY = rect.height / 2;

    // Calculate offset from center, normalize to -1..1
    const offsetX = (x - centerX) / centerX;
    const offsetY = (y - centerY) / centerY;

    // Apply rotation with smoothing
    rotateY = offsetX * maxRotate;
    rotateX = -offsetY * maxRotate; // invert Y for natural feel

    container.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
  });

  // Reset on leave
  scene.addEventListener('mouseleave', () => {
    container.style.transform = 'rotateX(0deg) rotateY(0deg)';
  });
});
</script>
