<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>貪吃蛇小遊戲 - 街機版</title>
<link rel="stylesheet" href="style.css">
<style>
/* Arcade specific overrides */
:root {
  --arcade-bg: #0d0d0d;
  --arcade-snake: #39ff14;
  --arcade-food: #ff073a;
  --arcade-grid: rgba(255,255,255,0.05);
  --arcade-text: #ffff00;
}
body.arcade {
  background: var(--arcade-bg);
  color: var(--arcade-text);
  font-family: 'Press Start 2P', monospace;
}
#snake-canvas {
  background: #000;
  border: 4px solid var(--arcade-snake);
  box-shadow: 0 0 15px var(--arcade-snake);
}
#score-display, #high-score-display {
  font-family: 'Press Start 2P', monospace;
  letter-spacing: 1px;
  text-shadow: 0 0 5px var(--arcade-text);
}
home-btn, #restart-btn {
  font-family: 'Press Start 2P', monospace;
}
/* Ensure full page height and center main content */
html,body{
  height:100%;
  margin:0;
}
body{
  display:flex;
  flex-direction:column;
}
header,footer{
  flex:0 0 auto;
}
main{
  flex:1 0 auto;
  display:flex;
  align-items:center;
  justify-content:center;
}
/* Center the game container */
.game-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
}
/* Touch controls diamond shape */
.touch-diamond {
  display: grid;
  grid-template-areas:
    ". up ."
    "left . right"
    ". down .";
  gap: 10px;
  margin-top: 20px;
}
.touch-diamond button {
  width: 60px;
  height: 60px;
  font-size: 1.5rem;
  background: #fce7f3;
  border: none;
  border-radius: 50%;
  cursor: pointer;
  transition: background 0.2s;
}
.touch-diamond button:hover {
  background: #fbcfe8;
}
.touch-diamond #btn-up { grid-area: up; }
.touch-diamond #btn-down { grid-area: down; }
.touch-diamond #btn-left { grid-area: left; }
.touch-diamond #btn-right { grid-area: right; }
</style>
</head>
<body>
<header>
<h1>貪吃蛇街機版</h1>
<nav>
<ul>
<li><a href='index.html'>首頁</a></li>
<li><a href='snake.html' class='active'>貪吃蛇小遊戲</a></li>
<li><a href='pricing.html'>定價方案</a></li>
<li><a href='contact.html'>聯絡我們</a></li>
</ul>
</nav>
</header>
<main>
<div class="game-container">
<canvas id="snake-canvas"></canvas>
<div id="score-display">Score: 0</div>
<div id="high-score-display">High Score: 0</div>
<button id="restart-btn">開始遊戲</button>
<p>使用方向鍵或螢幕上的方向按鈕控制蛇的移動，吃到紅色方塊得分，避免撞到牆壁或自己。</p>
<div class="touch-diamond">
  <button id="btn-up" aria-label="上">▲</button>
  <button id="btn-left" aria-label="左">◀</button>
  <button id="btn-right" aria-label="右">▶</button>
  <button id="btn-down" aria-label="下">▼</button>
</div>
</div>
<div id="leaderboard">
  <h3>排行榜</h3>
  <ol id="leaderboard-list"></ol>
</div>
</main>
<footer><p> 2026 全雲端公司 | 由 AI Agent 自動維護</p></footer>
<script src="snake.js"></script>
</body>
</html>
