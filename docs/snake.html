<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>貪吃蛇小遊戲</title>
<link rel="stylesheet" href="style.css">
<style>
  .game-container { text-align: center; margin-top: 2rem; }
  #score-display { font-size: 1.5rem; margin-bottom: 1rem; }
  #restart-btn { padding: 0.5rem 1rem; font-size: 1rem; cursor: pointer; }
  .home-btn {
    display: inline-block;
    margin: 1rem auto;
    padding: 0.5rem 1rem;
    background: #fce7f3;
    border: none;
    border-radius: 4px;
    font-size: 1rem;
    cursor: pointer;
    text-decoration: none;
    color: #1e293b;
    transition: background 0.2s;
  }
  .home-btn:hover {
    background: #fbcfe8;
  }
  #snake-canvas {
    display: block;
    margin: 0 auto 1rem;
    background: #fff;
    border: 2px solid #333;
    border-radius: 8px;
    width: 90vmin;
    height: 90vmin;
    max-width: 400px;
    max-height: 400px;
  }
  .touch-controls {
    position: absolute;
    bottom: 1rem;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 0.5rem;
    z-index: 10;
  }
  .touch-controls button {
    background: rgba(255,255,255,0.7);
    border: none;
    border-radius: 50%;
    width: 2.5rem;
    height: 2.5rem;
    font-size: 1.5rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .touch-controls button:hover {
    background: rgba(255,255,255,0.9);
  }
  @media (pointer: fine) {
    .touch-controls { display: none; }
  }
</style>
</head>
<body>
<header>
<h1>貪吃蛇小遊戲</h1>
<a href="index.html" class="home-btn">返回首頁</a>
</header>
<main>
<div class="game-container">
<canvas id="snake-canvas"></canvas>
<div class="touch-controls">
  <button id="btn-up" aria-label="上">▲</button>
  <button id="btn-down" aria-label="下">▼</button>
  <button id="btn-left" aria-label="左">◀</button>
  <button id="btn-right" aria-label="右">▶</button>
</div>
<div id="score-display">Score: 0</div>
<button id="restart-btn">重新開始</button>
<p>使用方向鍵或螢幕上的方向按鈕控制蛇的移動，吃到紅色方塊得一分，避免撞到牆壁或自己。</p>
</div>
</main>
<footer><p> 2026 全雲端公司 | 由 AI Agent 自動維護</p></footer>
<script src="snake.js"></script>
</body>
</html>
