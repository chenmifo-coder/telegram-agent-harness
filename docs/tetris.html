<!DOCTYPE html>
<html lang='zh-TW'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1.0'>
<title>FMTX AI 創新公司</title>
<link rel='stylesheet' href='style.css'>
<style>
/* Tetris specific styles */
#tetris-container { text-align: center; margin-top: 2rem; }
#tetris-canvas { background: #000; display: block; margin: 0 auto; border: 2px solid #333; border-radius: 8px; }
#tetris-controls { margin-top: 1rem; }
#tetris-controls button { background: #fce7f3; border: none; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer; margin: 0.3rem; }
#tetris-controls button:hover { background: #fbcfe8; }
#score-display { font-size: 1.2rem; margin-top: 1rem; }
/* Theme selector */
#theme-select {
  margin-top: 0.8rem;
  padding: 0.4rem 0.8rem;
  border-radius: 6px;
  border: 1px solid #ddd;
  background: #fff;
  font-size: 0.9rem;
}
/* Touch controls for mobile */
#touch-controls {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 0.5rem;
  margin-top: 1rem;
  max-width: 300px;
  margin-left: auto;
  margin-right: auto;
}
#touch-controls button {
  width: 100%;
  aspect-ratio: 1;
  font-size: 1.5rem;
  background: #fce7f3;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}
#touch-controls button:hover {
  background: #fbcfe8;
}
/* Position the rotate button to span two columns */
#touch-rotate {
  grid-column: 2 / 3;
}
/* Store button */
#skin-btn {
  margin-top: 1rem;
  padding: 0.5rem 1rem;
  background: linear-gradient(135deg, #ec4899, #10b981);
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-weight: 600;
  transition: transform 0.2s;
}
#skin-btn:hover { transform: translateY(-2px); }
/* Coin display */
#coin-display {
  font-size: 1rem;
  color: #f59e0b;
  margin-top: 0.5rem;
}
</style>
</head>
<body>
<header>
<h1>FMTX AI 創新公司</h1>
<p>AI 驅動的下一代雲端解決方案</p>
<nav>
<ul>
<li><a href='index.html'>首頁</a></li>
<li><a href='games.html' class='active'>遊戲專區</a></li>
<li><a href='pricing.html'>定價方案</a></li>
<li><a href='contact.html'>聯絡我們</a></li>
</ul>
</nav>
<button id='theme-toggle' class='theme-toggle' aria-label='切換深色/淺色模式'>🌓</button>
</header>

<main class="main-content" style="padding: 2rem;">
<h2>俄羅斯方塊</h2>
<div id="tetris-container">
<canvas id="tetris-canvas" width="240" height="480"></canvas>
<div>
<div id="score-display">Score: 0</div>
<div id="coin-display">Coins: <span id="coin-count">0</span></div>
<select id="theme-select">
  <option value="classic">經典</option>
  <option value="neon">霓虹</option>
  <option value="pastel">淡雅</option>
  <option value="dark">暗黑</option>
</select>
<div id="tetris-controls">
<button id="start-btn">開始</button>
<button id="pause-btn">暫停</button>
<button id="reset-btn">重置</button>
<button id="skin-btn">皮膚商店</button>
</div>
</div>
</div>
<!-- Touch controls for mobile -->
<div id="touch-controls">
  <button id="touch-left">←</button>
  <button id="touch-rotate">↻</button>
  <button id="touch-right">→</button>
  <button id="touch-drop" style="grid-column: 1 / 4;">↓</button>
</div>
</main>

<footer>
<p> 2026 全雲端公司 | 由 AI Agent 自動維護</p>
<button id='contact-btn' class='contact-btn'>聯絡我們</button>
</footer>
<div id='contact-modal' class='modal'>
<div class='modal-content'>
<span class='close-btn'>&times;</span>
<h2>聯絡我們</h2>
<form id='contact-form'>
<label for='cname'>姓名：</label>
<input type='text' id='cname' name='cname' required><br><br>
<label for='cemail'>Email：</label>
<input type='email' id='cemail' name='cemail' required><br><br>
<label for='cmsg'>訊息：</label>
<textarea id='cmsg' name='cmsg' rows='4' required></textarea><br><br>
<button type='submit'>送出</button>
</form>
<div id='form-response' style='margin-top:1rem; display:none;'></div>
</div>
</div>
<script src='script.js'></script>
<script>
// Tetris game logic with coin & theme support
const canvas = document.getElementById('tetris-canvas');
const ctx = canvas.getContext('2d');
const COLS = 10;
const ROWS = 20;
const BLOCK_SIZE = 24; // 240/10 = 24, 480/20 = 24
canvas.width = COLS * BLOCK_SIZE;
canvas.height = ROWS * BLOCK_SIZE;
ctx.scale(BLOCK_SIZE, BLOCK_SIZE);

let arena = createMatrix(ROWS, COLS);
let player = {
  pos: {x: 0, y: 0},
  matrix: null,
  score: 0
};
let coins = parseInt(localStorage.getItem('tetrisCoins')||'0',10);
document.getElementById('coin-count').textContent = coins;

const themes = {
  classic: [
    null,
    '#FF0D72',
    '#0DC2FF',
    '#0DFF72',
    '#F538FF',
    '#FF8E0D',
    '#FFE138',
    '#3877FF',
  ],
  neon: [
    null,
    '#ff00ff',
    '#00ffff',
    '#00ff00',
    '#ff0080',
    '#ff8000',
    '#ffff00',
    '#0080ff',
  ],
  pastel: [
    null,
    '#ffb3ba',
    '#bae1ff',
    '#baffc9',
    '#ffdfba',
    '#ffffba',
    '#ffdfba',
    '#bae1ff',
  ],
  dark: [
    null,
    '#8b0000',
    '#00008b',
    '#006400',
    '#8b008b',
    '#8b4500',
    '#8b8b00',
    '#000000',
  ]
};
let currentTheme = 'classic';
let colors = themes[currentTheme];

function createMatrix(w, h) {
  const matrix = [];
  while (h--) {
    matrix.push(new Array(w).fill(0));
  }
  return matrix;
}

function createPiece(type) {
  if (type === 'T') {
    return [
      [0,0,0],
      [1,1,1],
      [0,1,0]
    ];
  } else if (type === 'O') {
    return [
      [2,2],
      [2,2]
    ];
  } else if (type === 'L') {
    return [
      [0,3,0],
      [0,3,0],
      [0,3,3]
    ];
  } else if (type === 'J') {
    return [
      [0,4,0],
      [0,4,0],
      [4,4,0]
    ];
  } else if (type === 'I') {
    return [
      [0,5,0,0],
      [0,5,0,0],
      [0,5,0,0],
      [0,5,0,0]
    ];
  } else if (type === 'S') {
    return [
      [0,6,6],
      [6,6,0],
      [0,0,0]
    ];
  } else if (type === 'Z') {
    return [
      [7,7,0],
      [0,7,7],
      [0,0,0]
    ];
  }
}

function drawMatrix(matrix, offset) {
  matrix.forEach((row, y) => {
    row.forEach((value, x) => {
      if (value !== 0) {
        ctx.fillStyle = colors[value];
        ctx.fillRect(x + offset.x, y + offset.y, 1, 1);
      }
    });
  });
}

function draw() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  drawMatrix(arena, {x:0, y:0});
  drawMatrix(player.matrix, player.pos);
}

function merge(arena, player) {
  player.matrix.forEach((row, y) => {
    row.forEach((value, x) => {
      if (value !== 0) {
        arena[y + player.pos.y][x + player.pos.x] = value;
      }
    });
  });
}

function collide(arena, player) {
  const m = player.matrix;
  const o = player.pos;
  for (let y = 0; y < m.length; ++y) {
    for (let x = 0; x < m[y].length; ++x) {
      if (m[y][x] !== 0 &&
          (arena[y + o.y] &&
           arena[y + o.y][x + o.x]) !== 0) {
        return true;
      }
    }
  }
  return false;
}

function arenaSweep() {
  let rowCount = 1;
  outer: for (let y = arena.length -1; y >= 0; --y) {
    for (let x = 0; x < arena[y].length; ++x) {
      if (arena[y][x] === 0) {
        continue outer;
      }
    }
    const row = arena.splice(y,1)[0].fill(0);
    arena.unshift(row);
    ++y;
    player.score += rowCount * 10;
    // earn coins per line cleared
    coins += rowCount * 5;
    localStorage.setItem('tetrisCoins', coins);
    document.getElementById('coin-count').textContent = coins;
    rowCount *= 2;
  }
}

function playerDrop() {
  player.pos.y++;
  if (collide(arena, player)) {
    player.pos.y--;
    merge(arena, player);
    playerReset();
    arenaSweep();
    updateScore();
  }
  dropCounter = 0;
}

function playerMove(offset) {
  player.pos.x += offset;
  if (collide(arena, player)) {
    player.pos.x -= offset;
  }
}

function playerRotate(dir) {
  const pos = player.pos.x;
  let offset = 1;
  rotate(player.matrix, dir);
  while (collide(arena, player)) {
    player.pos.x += offset;
    offset = -(offset + (offset > 0 ? 1 : -1));
    if (offset > player.matrix[0].length) {
      rotate(player.matrix, -dir);
      player.pos.x = pos;
      return;
    }
  }
}

function rotate(matrix, dir) {
  for (let y = 0; y < matrix.length; ++y) {
    for (let x = 0; x < y; ++x) {
      [
        matrix[x][y],
        matrix[y][x]
      ] = [
        matrix[y][x],
        matrix[x][y]
      ];
    }
  }
  if (dir > 0) {
    matrix.forEach(row => row.reverse());
  } else {
    matrix.reverse();
  }
}

let dropCounter = 0;
let dropInterval = 1000;
let lastTime = 0;

function update(time = 0) {
  const delta = time - lastTime;
  lastTime = time;
  dropCounter += delta;
  if (dropCounter > dropInterval) {
    playerDrop();
  }
  draw();
  requestAnimationFrame(update);
}

function updateScore() {
  document.getElementById('score-display').textContent = `Score: ${player.score}`;
}

function playerReset() {
  const pieces = 'TOLJSIZ';
  player.matrix = createPiece(pieces[pieces.length * Math.random() | 0]);
  player.pos.y = 0;
  player.pos.x = ((arena[0].length / 2) | 0) - ((player.matrix[0].length / 2) | 0);
  if (collide(arena, player)) {
    arena.forEach(row => row.fill(0));
    player.score = 0;
    updateScore();
  }
}

document.addEventListener('keydown', event => {
  if (event.key === 'ArrowLeft') {
    playerMove(-1);
  } else if (event.key === 'ArrowRight') {
    playerMove(1);
  } else if (event.key === 'ArrowDown') {
    playerDrop();
  } else if (event.key === 'ArrowUp') {
    playerRotate(1);
  }
});

document.getElementById('start-btn').addEventListener('click', () => {
  if (!isRunning) {
    isRunning = true;
    lastTime = 0;
    update();
  }
});
document.getElementById('pause-btn').addEventListener('click', () => {
  isRunning = false;
});
document.getElementById('reset-btn').addEventListener('click', () => {
  isRunning = false;
  arena.forEach(row => row.fill(0));
  player.score = 0;
  updateScore();
  playerReset();
  draw();
});

let isRunning = false;
playerReset();
updateScore();
draw();

// Theme selector
document.getElementById('theme-select').addEventListener('change', e => {
  currentTheme = e.target.value;
  colors = themes[currentTheme];
  // redraw with new colors
  draw();
});

// Touch controls for mobile
document.addEventListener('DOMContentLoaded', () => {
  const touchLeft = document.getElementById('touch-left');
  const touchRight = document.getElementById('touch-right');
  const touchRotate = document.getElementById('touch-rotate');
  const touchDrop = document.getElementById('touch-drop');

  if (touchLeft) touchLeft.addEventListener('click', () => playerMove(-1));
  if (touchRight) touchRight.addEventListener('click', () => playerMove(1));
  if (touchRotate) touchRotate.addEventListener('click', () => playerRotate(1));
  if (touchDrop) touchDrop.addEventListener('click', () => playerDrop());
});

// Skin store placeholder
document.getElementById('skin-btn').addEventListener('click', () => {
  alert('皮膚商店即將上線！\n敬請期待各種方塊主題與特效，使用金幣解鎖。');
});
</script>
</body>
</html>
